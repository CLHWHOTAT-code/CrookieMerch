<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Page</title>

  <link rel="stylesheet" href="checkout.css" />
</head>

<body>
  
<a href="index.html" class="home-btn">← Back to Home</a>
  <div class="checkout-container">

    <!-- Checkout Form -->
    <div class="checkout-form">
      <h2>Checkout</h2>

      <form>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Cookie Doe" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="CRK@example.com" required>
        </div>

        <div class="form-group">
          <label>Shipping Address</label>
          <input type="text" placeholder="Jl Ikan Tawar" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="Lawang" required>
          </div>

          <div class="form-group">
            <label>Postal Code</label>
            <input type="text" placeholder="1000 AB" required>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Country</label>
            <select required>
              <option>Indonesia</option>
              <option>Malaysia</option>
              <option>Philipina</option>
              <option>Singapore</option>
            </select>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+60 6 12345678">
          </div>
        </div>

        <h2 class="payment-title">Payment Details</h2>

        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" placeholder="Cookie Doe" required>
        </div>

        <div class="form-group">
          <label>Card Number</label>
          <input type="text" placeholder="1234 5678 9012 3456" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY" required>
          </div>

          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="123" required>
          </div>
        </div>

        <button class="checkout-btn" type="submit">
          Complete Purchase
        </button>

      </form>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">
      <h2>Order Summary</h2>

      <div class="order-item">
        <span>ESC Plushie</span>
        <span>$35.00</span>
      </div>

      <div class="order-item">
        <span>SMC Keychain</span>
        <span>$10.00</span>
      </div>

      <div class="order-item">
        <span>BS Keychain</span>
        <span>$10.00</span>
      </div>

      <div class="summary-total">
        <span>Total</span>
        <span>$55.00</span>
      </div>

      <button class="checkout-btn">
        Proceed to Payment
      </button>
    </div>

  </div>

</body>
</html>
